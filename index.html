<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 노동요 추천</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <header class="header">
      <h1 class="title">오늘의 노동요 추천</h1>
      <p class="subtitle">노래를 들어야 업무에 집중이 잘 됩니다만</p>
    </header>

    <section class="input-section">

      <div class="field-group">
        <label class="field-label" for="intensity">업무 강도</label>
        <div class="slider-row">
          <span class="slider-cap">낮음</span>
          <input type="range" id="intensity" min="1" max="3" value="2" step="1" class="pixel-slider">
          <span class="slider-cap">높음</span>
        </div>
        <div class="slider-value" id="intensity-label">보통</div>
      </div>


<div class="field-group">
        <label class="field-label" for="memo">업무 메모 <span class="optional">(선택)</span></label>
        <textarea id="memo" class="pixel-textarea" placeholder="오늘 어떤 업무를 하나요?"></textarea>
      </div>

      <div class="field-group">
        <label class="field-label">장르 <span class="optional">(선택)</span></label>
        <div class="genre-grid" id="genres">
          <button type="button" class="genre-badge" data-genre="lofi" style="--badge-bg:#b8d4e8;">🌙 lofi / chill</button>
          <button type="button" class="genre-badge" data-genre="jazz" style="--badge-bg:#e8d4b8;">🎷 재즈 / 보사노바</button>
          <button type="button" class="genre-badge" data-genre="classical" style="--badge-bg:#e8e8d4;">🎻 클래식</button>
          <button type="button" class="genre-badge" data-genre="synth" style="--badge-bg:#d4b8e8;">🔊 신스팝 / 일렉트로닉</button>
          <button type="button" class="genre-badge" data-genre="game" style="--badge-bg:#b8e8d4;">🎮 게임OST / 애니OST</button>
          <button type="button" class="genre-badge" data-genre="kindic" style="--badge-bg:#e8b8d4;">🌿 K-인디</button>
          <button type="button" class="genre-badge" data-genre="citypop" style="--badge-bg:#fcd4b8;">🌆 시티팝</button>
          <button type="button" class="genre-badge" data-genre="hiphop" style="--badge-bg:#d4d4e8;">🎤 힙합 / R&amp;B</button>
          <button type="button" class="genre-badge" data-genre="kpop" style="--badge-bg:#f4b8c1;">💫 K-팝</button>
          <button type="button" class="genre-badge" data-genre="jpop" style="--badge-bg:#fce4b8;">🌸 J-팝</button>
          <button type="button" class="genre-badge" data-genre="rock" style="--badge-bg:#c8c8c8;">🎸 밴드 / 락</button>
        </div>
      </div>

      <button type="button" class="recommend-btn" id="recommend-btn">▶ 추천받기</button>

    </section>

    <section class="results-section hidden" id="results-section">
      <div id="loading-msg" class="loading-msg" hidden>🎵 노동요 찾는 중...</div>
      <div id="error-msg" class="error-msg" hidden></div>
      <div id="results-grid" class="results-grid"></div>
    </section>

  </div>
  <script src="app.js"></script>
</body>
</html>
